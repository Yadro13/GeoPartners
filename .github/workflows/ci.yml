name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Start application
        run: |
          npm run dev -- --hostname 127.0.0.1 --port 3000 > /tmp/geopartners.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/ui-preview > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/geopartners.log
          exit 1
      - name: Run browser smoke test
        env:
          BASE_URL: http://127.0.0.1:3000/ui-preview
        run: npm run test:e2e
